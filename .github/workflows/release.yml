name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-java@v5
        with:
          java-version: '25'
          distribution: 'temurin'

      - name: Build assembly
        run: ./mill server.assembly

      - name: Test assembly
        run: |
          echo '{"jsonrpc":"2.0","id":1,"method":"initialize","params":{"processId":1,"rootUri":"file:///tmp","capabilities":{}}}' > /tmp/init.json
          CONTENT=$(cat /tmp/init.json)
          LEN=${#CONTENT}
          (printf "Content-Length: %d\r\n\r\n%s" "$LEN" "$CONTENT"; sleep 1) | timeout 3 java -jar out/server/assembly.dest/out.jar 2>&1 || true

      - name: Prepare release artifact
        run: |
          cp out/server/assembly.dest/out.jar unreal-scala-lsp.jar
          shasum -a 256 unreal-scala-lsp.jar > checksums.txt
          cat checksums.txt

      - uses: actions/upload-artifact@v7
        with:
          name: unreal-scala-lsp
          path: |
            unreal-scala-lsp.jar
            checksums.txt

  release:
    needs: build
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6

      - uses: actions/download-artifact@v8
        with:
          name: unreal-scala-lsp
          path: artifacts

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/unreal-scala-lsp.jar
            artifacts/checksums.txt
          generate_release_notes: true
